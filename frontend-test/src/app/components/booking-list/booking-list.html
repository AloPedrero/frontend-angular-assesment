<div
  class="booking-card"
  *ngFor="let booking of bookings"
>

  <div class="booking-info">
    <h3>{{ booking.className }}</h3>

    <p>
      Instructor: {{ booking.instructor }}
    </p>

    <p>
      {{ booking.schedule }}
    </p>
  </div>

  <button class="view-button">
    Ver más
  </button>

</div>
