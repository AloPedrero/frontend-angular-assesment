<div class="app-container">

  <header class="header">
    <h1>🏋️ Reservas disponibles</h1>
  </header>

  <main class="content">

    <section class="list-section">

      <app-booking-list
        (bookingSelected)="onBookingSelected($event)">
      </app-booking-list>

    </section>

    <section class="detail-section">

      <app-booking-detail
        [booking]="selectedBooking">
      </app-booking-detail>

    </section>

  </main>

</div>
